<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#33A6B8" />
    <meta name="description" content="PhyVerse — 3D 高中物理实验引擎" />
    <title>PhyVerse — 物理宇宙</title>
    <!-- Preload Rapier WASM for faster physics engine initialization -->
    <link rel="preload" as="fetch" href="https://cdn.jsdelivr.net/npm/@dimforge/rapier3d@0.19.3/rapier3d_bg.wasm" crossorigin />
    <!-- Preconnect to CDN origins for faster asset loading -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <div
        id="app-loading"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          background: #fefefb;
          color: #6b6b6b;
          font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
          z-index: 9999;
        "
      >
        <svg
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#33A6B8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 2v7.31" />
          <path d="M14 2v7.31" />
          <path d="M8.5 2h7" />
          <path d="M14 9.3a6.5 6.5 0 1 1-4 0" />
          <path d="M12 19a2 2 0 0 0 2-2c0-1.1-1.34-3-2-3s-2 1.9-2 3a2 2 0 0 0 2 2Z" />
        </svg>
        <p style="margin: 0; font-size: 14px">PhyVerse 加载中...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
